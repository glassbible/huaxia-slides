<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>華夏玻璃 — 紙器採購自動化系統</title>
<style>
:root {
  --blue: #1a56db; --blue-light: #e8f0fe; --blue-dark: #1341b0;
  --green: #057a55; --green-light: #f0fdf4;
  --gray: #6b7280; --gray-light: #f3f4f6; --gray-border: #e5e7eb;
  --red: #dc2626; --red-light: #fef2f2;
  --shadow: 0 1px 3px rgba(0,0,0,.1); --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Microsoft JhengHei","PingFang TC",sans-serif;
       background: #f0f2f5; color: #111827; font-size: 14px; }

/* ── 頂部 ── */
header { background: linear-gradient(135deg,#1a56db 0%,#0e3fa3 100%);
  color:#fff; padding:0 24px; height:58px; display:flex; align-items:center;
  gap:14px; box-shadow:0 2px 8px rgba(0,0,0,.2); position:sticky; top:0; z-index:100; }
header .logo { font-size:18px; font-weight:700; letter-spacing:1px; }
header .subtitle { font-size:12px; opacity:.7; margin-top:2px; }
header .spacer { flex:1; }
header button { padding:7px 16px; border-radius:6px; border:none; font-size:13px;
  font-family:inherit; cursor:pointer; font-weight:600; display:flex;
  align-items:center; gap:6px; }
.btn-save { background:#fff; color:var(--blue); }
.btn-save:hover { background:#e8f0fe; }
.btn-pdf  { background:#facc15; color:#1e3a5f; }
.btn-pdf:hover { background:#fbbf24; }

/* ── 主體 ── */
.container { display:grid; grid-template-columns:420px 1fr; gap:20px;
  padding:20px 24px; max-width:1400px; margin:0 auto; }

/* ── 卡片 ── */
.card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
.card-header { background:var(--blue-light); border-bottom:1px solid #c7d7fc;
  padding:12px 18px; display:flex; align-items:center; gap:8px; }
.card-header h2 { font-size:14px; font-weight:700; color:var(--blue-dark); }
.card-body { padding:16px 18px; }

/* ── 表單 ── */
.section-title { font-size:11px; font-weight:700; color:var(--gray);
  text-transform:uppercase; letter-spacing:1px; margin:14px 0 8px;
  padding-bottom:4px; border-bottom:1px solid var(--gray-border); }
.section-title:first-child { margin-top:0; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.form-grid.full { grid-template-columns:1fr; }
.form-group { display:flex; flex-direction:column; gap:3px; }
.form-group label { font-size:11.5px; color:var(--gray); font-weight:600; }
.form-group input,.form-group select,.form-group textarea {
  border:1px solid var(--gray-border); border-radius:5px; padding:6px 9px;
  font-size:13px; font-family:inherit; transition:border-color .15s,box-shadow .15s;
  background:#fafafa; }
.form-group input:focus,.form-group select:focus,.form-group textarea:focus {
  outline:none; border-color:var(--blue); background:#fff;
  box-shadow:0 0 0 3px rgba(26,86,219,.12); }
.form-group textarea { resize:vertical; min-height:48px; }

/* ── 明細表 ── */
.item-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
.item-table th { background:#e8f0fe; color:var(--blue-dark); font-weight:700;
  padding:6px 5px; border:1px solid #c7d7fc; text-align:center; font-size:11px; }
.item-table td { border:1px solid var(--gray-border); padding:3px; }
.item-table td input { border:none; background:transparent; width:100%;
  font-size:12px; font-family:inherit; padding:2px 4px; }
.item-table td input:focus { outline:1px solid var(--blue); background:#e8f0fe; border-radius:2px; }
.item-table .line-no { background:var(--gray-light); text-align:center;
  font-weight:700; color:var(--gray); font-size:11px; width:28px; }

/* ── 金額 ── */
.total-box { background:var(--gray-light); border-radius:6px; padding:10px 14px; margin-top:10px; }
.total-row-disp { display:flex; justify-content:space-between; padding:3px 0;
  font-size:12.5px; border-bottom:1px solid #e5e7eb; }
.total-row-disp:last-child { border:none; font-weight:700; font-size:14px;
  color:var(--blue-dark); padding-top:6px; }

/* ── 預覽 tabs ── */
.preview-tabs { display:flex; gap:2px; padding:14px 18px 0;
  border-bottom:2px solid var(--gray-border); }
.tab-btn { padding:8px 16px; border:none; background:none; cursor:pointer;
  font-size:13px; font-family:inherit; border-radius:6px 6px 0 0;
  color:var(--gray); border-bottom:2px solid transparent; margin-bottom:-2px; }
.tab-btn.active { color:var(--blue); border-bottom-color:var(--blue);
  background:var(--blue-light); font-weight:700; }
.tab-btn:hover:not(.active) { background:var(--gray-light); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ── 文件預覽 ── */
.doc-preview { font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
  font-size:8.5pt; color:#000; padding:14px 18px 18px;
  background:#fff; min-height:300px; }
.doc-company { text-align:center; font-size:15pt; font-weight:bold;
  letter-spacing:3px; padding:6px 0 3px; }
.doc-title { text-align:center; font-size:12pt; font-weight:bold;
  letter-spacing:5px; padding-bottom:4px; }
.doc-hr { border:none; border-top:1.5px solid #000; margin:4px 0 6px; }
.doc-info { display:grid; grid-template-columns:1fr 1fr; gap:2px 12px;
  margin-bottom:8px; font-size:8pt; }
.doc-info .lbl { color:#555; }
.doc-table { width:100%; border-collapse:collapse; font-size:7.5pt; }
.doc-table th { background:#e0e0e0; border:.5px solid #555; padding:3px 4px;
  text-align:center; }
.doc-table td { border:.5px solid #888; padding:3px 4px; text-align:center;
  height:9mm; vertical-align:middle; }
.doc-table td.left { text-align:left; }
.doc-bottom { display:flex; gap:8px; margin-top:6px; }
.doc-notes  { flex:1; }
.doc-notes-lbl { font-size:7pt; margin-bottom:2px; }
.doc-notes-box { border:.5px solid #888; min-height:18mm; padding:3px 5px; font-size:8pt; }
.doc-totals { width:60mm; flex-shrink:0; }
.doc-tr { display:flex; border:.5px solid #888; margin-top:-.5px; }
.doc-tr .tl { background:#ebebeb; width:33mm; padding:2px 4px;
  text-align:right; font-size:7.5pt; border-right:.5px solid #888; }
.doc-tr .tv { flex:1; padding:2px 4px; text-align:right; font-size:8pt; }
.doc-tr.grand { font-weight:bold; }
.doc-sig { width:100%; border-collapse:collapse; margin-top:8px; }
.doc-sig th { background:#ebebeb; border:.5px solid #555; padding:3px;
  font-size:7pt; text-align:center; }
.doc-sig td { border:.5px solid #555; height:10mm; }
.doc-footer { margin-top:6px; font-size:6.5pt; color:#666;
  display:flex; justify-content:space-between; }
.sup-badge { background:#e8f0fe; border:1px solid #3366cc; border-radius:3px;
  padding:2px 6px; font-size:7.5pt; color:#3366cc; font-weight:bold;
  text-align:center; margin-bottom:5px; }
.confirm-block { border:1px solid #aaa; border-radius:3px; padding:3px 6px;
  margin-top:5px; font-size:7pt; color:#555; line-height:1.7; }

/* ── URL區 ── */
.url-display { background:#1e293b; color:#94d2bd; padding:10px 14px;
  border-radius:6px; font-size:11px; font-family:monospace;
  margin-top:6px; word-break:break-all; line-height:1.6; }
.url-display .lbl { color:#64748b; font-size:10px; display:block; margin-bottom:4px; }
.url-display a { color:#7dd3fc; }
.action-row { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
.action-btn { padding:8px 14px; border-radius:6px; border:none; cursor:pointer;
  font-size:13px; font-family:inherit; font-weight:600;
  display:flex; align-items:center; gap:5px; transition:all .15s; }
.action-btn.primary { background:var(--blue); color:#fff; }
.action-btn.primary:hover { background:var(--blue-dark); }
.action-btn.secondary { background:var(--gray-light); color:#374151;
  border:1px solid var(--gray-border); }
.action-btn.secondary:hover { background:#e5e7eb; }

/* ── 狀態列 ── */
.status-bar { background:var(--green-light); border-top:1px solid #bbf7d0;
  padding:8px 24px; font-size:12px; color:var(--green);
  display:flex; align-items:center; gap:8px; position:sticky; bottom:0; }
.status-bar.error { background:var(--red-light); border-color:#fca5a5; color:var(--red); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">🏭 華夏玻璃</div>
    <div class="subtitle">紙器採購自動化系統</div>
  </div>
  <div class="spacer"></div>
  <button class="btn-save" onclick="saveData()">💾 儲存資料</button>
  <button class="btn-pdf"  onclick="generatePDFs()">📄 產出文件</button>
</header>

<div class="container">

  <!-- ─── 左欄：表單 ─── -->
  <div style="display:flex;flex-direction:column;gap:16px;">

    <!-- 供應商 -->
    <div class="card">
      <div class="card-header"><span>🏢</span><h2>公司 & 供應商</h2></div>
      <div class="card-body">
        <div class="section-title">供應商資訊</div>
        <div class="form-grid">
          <div class="form-group"><label>供應商代碼</label>
            <input id="sup_code" placeholder="10903" oninput="debouncePreview()"></div>
          <div class="form-group"><label>供應商名稱</label>
            <input id="sup_name" oninput="debouncePreview()"></div>
          <div class="form-group"><label>付款條件</label>
            <input id="sup_payment_terms" oninput="debouncePreview()"></div>
          <div class="form-group"><label>付款方式</label>
            <input id="sup_payment_method" placeholder="票據" oninput="debouncePreview()"></div>
        </div>
      </div>
    </div>

    <!-- 請購 -->
    <div class="card">
      <div class="card-header"><span>📄</span><h2>請購單資訊</h2></div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-group"><label>請購單號</label>
            <input id="pr_no" oninput="debouncePreview()"></div>
          <div class="form-group"><label>請購人</label>
            <input id="pr_requestor" oninput="debouncePreview()"></div>
          <div class="form-group"><label>請購日期</label>
            <input id="pr_date" type="date" oninput="debouncePreview()"></div>
          <div class="form-group"><label>請購單位</label>
            <input id="pr_dept" oninput="debouncePreview()"></div>
          <div class="form-group"><label>請購類型</label>
            <input id="pr_type" oninput="debouncePreview()"></div>
        </div>
        <div class="section-title" style="margin-top:12px">請購明細</div>
        <table class="item-table">
          <thead><tr>
            <th>項</th><th style="width:30%">品名</th>
            <th style="width:28%">規格</th><th style="width:14%">數量</th><th style="width:14%">需求日期</th>
          </tr></thead>
          <tbody id="pr_items_body"></tbody>
        </table>
        <div class="form-grid full" style="margin-top:10px">
          <div class="form-group"><label>備註</label>
            <textarea id="pr_remarks" oninput="debouncePreview()"></textarea></div>
        </div>
      </div>
    </div>

    <!-- 採購 -->
    <div class="card">
      <div class="card-header"><span>📋</span><h2>採購單資訊</h2></div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-group"><label>採購單號</label>
            <input id="po_no" oninput="debouncePreview()"></div>
          <div class="form-group"><label>採購人</label>
            <input id="po_buyer" oninput="debouncePreview()"></div>
          <div class="form-group"><label>採購日期</label>
            <input id="po_date" type="date" oninput="debouncePreview()"></div>
          <div class="form-group"><label>採購類型</label>
            <input id="po_type" oninput="debouncePreview()"></div>
          <div class="form-group"><label>成品編號</label>
            <input id="po_product_no" oninput="debouncePreview()"></div>
          <div class="form-group"><label>品名規格</label>
            <input id="po_product_name" oninput="debouncePreview()"></div>
          <div class="form-group"><label>幣別</label>
            <input id="po_currency" value="TWD" oninput="debouncePreview()"></div>
          <div class="form-group"><label>包裝方式</label>
            <input id="po_packing" oninput="debouncePreview()"></div>
        </div>
        <div class="section-title" style="margin-top:12px">採購明細</div>
        <table class="item-table">
          <thead><tr>
            <th>項</th><th style="width:24%">品名</th><th style="width:20%">規格</th>
            <th style="width:7%">材質</th><th style="width:7%">才數</th>
            <th style="width:8%">數量</th><th style="width:10%">單價/只</th><th style="width:11%">交貨日期</th>
          </tr></thead>
          <tbody id="po_items_body"></tbody>
        </table>
        <div class="total-box" id="total_box"></div>
        <div class="form-grid full" style="margin-top:10px">
          <div class="form-group"><label>注意事項</label>
            <textarea id="po_notes" oninput="debouncePreview()"></textarea></div>
        </div>
      </div>
    </div>

    <!-- 連結 -->
    <div class="card">
      <div class="card-header"><span>🔗</span><h2>資料模型 & 線上連結</h2></div>
      <div class="card-body">
        <div class="url-display">
          <span class="lbl">📡 JSON 資料模型 URL</span>
          https://raw.githubusercontent.com/glassbible/huaxia-slides/main/procurement_model.json
        </div>
        <div class="url-display">
          <span class="lbl">🌐 線上表單</span>
          <a href="請購單.html" target="_blank">📄 請購單</a> ·
          <a href="採購單_公司.html" target="_blank">📋 採購單（公司）</a> ·
          <a href="採購單_供應商.html" target="_blank">📦 採購單（供應商）</a>
        </div>
        <div class="action-row">
          <button class="action-btn primary" onclick="saveData()">💾 儲存到本機</button>
          <button class="action-btn secondary" onclick="exportJSON()">📤 匯出 JSON</button>
          <button class="action-btn secondary" onclick="importJSON()">📥 匯入 JSON</button>
          <input type="file" id="import_file" accept=".json" style="display:none" onchange="handleImport(event)">
        </div>
      </div>
    </div>
  </div><!-- end 左欄 -->

  <!-- ─── 右欄：預覽 ─── -->
  <div class="card" style="height:fit-content;position:sticky;top:74px;">
    <div class="card-header"><span>👁️</span><h2>即時預覽</h2></div>
    <div class="preview-tabs">
      <button class="tab-btn active" onclick="switchTab('pr',this)">📄 請購單</button>
      <button class="tab-btn" onclick="switchTab('po_co',this)">📋 採購單（公司）</button>
      <button class="tab-btn" onclick="switchTab('po_sup',this)">📦 採購單（供應商）</button>
    </div>
    <div id="tab_pr"     class="tab-content active doc-preview"><div id="prev_pr"></div></div>
    <div id="tab_po_co"  class="tab-content doc-preview"><div id="prev_po_co"></div></div>
    <div id="tab_po_sup" class="tab-content doc-preview"><div id="prev_po_sup"></div></div>
  </div>

</div>

<div class="status-bar" id="status_bar">⏳ 載入資料中…</div>

<script>
const MODEL_URL = "https://raw.githubusercontent.com/glassbible/huaxia-slides/main/procurement_model.json";
let M = null;

// ── 載入 ──
async function loadData() {
  try {
    const local = localStorage.getItem('huaxia_procurement');
    if (local) {
      M = JSON.parse(local);
      fillForm(M);
      setStatus('✅ 已從本機載入（' + (localStorage.getItem('huaxia_save_time')||'未知時間') + '）', false);
      return;
    }
    const res = await fetch(MODEL_URL + '?t=' + Date.now());
    M = await res.json();
    fillForm(M);
    setStatus('✅ 已從 GitHub 載入最新資料', false);
  } catch(e) {
    M = defaultModel();
    fillForm(M);
    setStatus('⚠️ 使用預設範本（離線模式）', true);
  }
}

function fillForm(m) {
  const pr=m.purchase_request, po=m.purchase_order, sup=m.supplier;
  sv('sup_code',sup.code); sv('sup_name',sup.name);
  sv('sup_payment_terms',sup.payment_terms); sv('sup_payment_method',sup.payment_method);
  sv('pr_no',pr.pr_no_short); sv('pr_requestor',pr.requestor);
  sv('pr_date',pr.date); sv('pr_dept',pr.dept); sv('pr_type',pr.type); sv('pr_remarks',pr.remarks);
  sv('po_no',po.po_no); sv('po_buyer',po.buyer); sv('po_date',po.po_date);
  sv('po_type',po.po_type); sv('po_product_no',po.product_no);
  sv('po_product_name',po.product_name); sv('po_currency',po.currency);
  sv('po_packing',po.packing); sv('po_notes',po.notes);
  renderPRItems(pr.items); renderPOItems(po.items);
  updateTotals(); updatePreview();
}
function sv(id,v){ const el=document.getElementById(id); if(el) el.value=v??''; }
function gv(id){ return document.getElementById(id)?.value??''; }

// ── 明細行 ──
function renderPRItems(items) {
  document.getElementById('pr_items_body').innerHTML =
    Array.from({length:4},(_,i)=>{
      const it=items[i]||{};
      return `<tr>
        <td class="line-no">${(i+1)*10}</td>
        <td><input data-pi="${i}" data-f="name"      value="${it.name||''}"      oninput="syncPR(this)"></td>
        <td><input data-pi="${i}" data-f="spec"      value="${it.spec||''}"      oninput="syncPR(this)"></td>
        <td><input data-pi="${i}" data-f="qty"       value="${it.qty||''}"       oninput="syncPR(this)" style="text-align:center" type="number"></td>
        <td><input data-pi="${i}" data-f="need_date" value="${it.need_date||''}" oninput="syncPR(this)"></td>
      </tr>`;}).join('');
}
function renderPOItems(items) {
  document.getElementById('po_items_body').innerHTML =
    Array.from({length:4},(_,i)=>{
      const it=items[i]||{};
      return `<tr>
        <td class="line-no">${(i+1)*10}</td>
        <td><input data-poi="${i}" data-f="name"          value="${it.name||''}"          oninput="syncPO(this)"></td>
        <td><input data-poi="${i}" data-f="spec"          value="${it.spec||''}"          oninput="syncPO(this)"></td>
        <td><input data-poi="${i}" data-f="material"      value="${it.material||''}"      oninput="syncPO(this)" style="text-align:center"></td>
        <td><input data-poi="${i}" data-f="sqft"          value="${it.sqft||''}"          oninput="syncPO(this)" type="number" step="0.01" style="text-align:center"></td>
        <td><input data-poi="${i}" data-f="qty"           value="${it.qty||''}"           oninput="syncPO(this);calcSub(${i})" type="number" style="text-align:center"></td>
        <td><input data-poi="${i}" data-f="unit_price"    value="${it.unit_price||''}"    oninput="syncPO(this);calcSub(${i})" type="number" step="0.01"></td>
        <td><input data-poi="${i}" data-f="delivery_date" value="${it.delivery_date||''}" oninput="syncPO(this)"></td>
      </tr>`;}).join('');
}

function syncPR(el){
  const i=+el.dataset.pi, f=el.dataset.f;
  while(M.purchase_request.items.length<=i) M.purchase_request.items.push({});
  M.purchase_request.items[i][f]=el.value; debouncePreview();
}
function syncPO(el){
  const i=+el.dataset.poi, f=el.dataset.f;
  while(M.purchase_order.items.length<=i) M.purchase_order.items.push({});
  const num=['qty','unit_price','sqft'].includes(f);
  M.purchase_order.items[i][f]=num?(parseFloat(el.value)||0):el.value; debouncePreview();
}
function calcSub(i){
  const it=M.purchase_order.items[i]; if(!it) return;
  it.subtotal=Math.round((it.qty||0)*(it.unit_price||0)*100)/100;
  updateTotals();
}
function updateTotals(){
  const items=M.purchase_order.items.filter(it=>it&&it.qty);
  const pre=items.reduce((s,it)=>s+(it.subtotal||0),0);
  const tax=Math.round(pre*(M.purchase_order.tax_rate||0.05));
  const total=pre+tax;
  Object.assign(M.purchase_order,{subtotal_pretax:pre,subtotal_after_discount:pre,tax,total_with_tax:total});
  document.getElementById('total_box').innerHTML=[
    ['未稅總計',pre],['附加費用',0],['折扣',0],
    ['折扣後未稅',pre],['營業稅（5%）',tax],['含稅總額',total]
  ].map(([l,v])=>`<div class="total-row-disp"><span>${l}</span><span>${f(v)}</span></div>`).join('');
}

// ── 讀回 M ──
function readForm(){
  const pr=M.purchase_request, po=M.purchase_order, sup=M.supplier;
  sup.code=gv('sup_code'); sup.name=gv('sup_name');
  sup.payment_terms=gv('sup_payment_terms'); sup.payment_method=gv('sup_payment_method');
  pr.pr_no_short=gv('pr_no'); pr.requestor=gv('pr_requestor');
  pr.date=gv('pr_date'); pr.dept=gv('pr_dept'); pr.type=gv('pr_type'); pr.remarks=gv('pr_remarks');

function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab_'+name).classList.add('active');
}

function exportJSON(){

  setStatus('📤 JSON 已匯出！請上傳至 GitHub → huaxia-slides/procurement_model.json 以更新線上資料。',false);
}
function importJSON(){ document.getElementById('import_file').click(); }
function handleImport(e){
  const file=e.target.files[0]; if(!file) return;
  new FileReader().onload=ev=>{
    try{ M=JSON.parse(ev.target.result); fillForm(M); setStatus('📥 JSON 匯入成功！',false); }
    catch{ setStatus('❌ JSON 格式錯誤',true); }
  };
  new FileReader().readAsText(file);
}
